<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>外傷観察カード（JSON駆動・判定エンジン版）</title>
<style>
:root {
    --bg: #f3f4f6;
    --card: #ffffff;
    --line: #1f2937;
    --muted: #6b7280;
    --a: #f3f4f6;
    --b: #fff36a;
    --c: #48ff48;
    --danger: #d90000;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: #111827;
  }
  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
  }
  .topbar {
    display: grid;
    gap: 16px;
    align-items: start;
  }
  .panel {
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .result-panel {
    position: sticky;
    bottom: 12px;
    z-index: 30;
    border: 3px solid #111827;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(6px);
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 28px;
  }
  .sub {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .judge-badges {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .judge-badge {
    min-width: 64px;
    text-align: center;
    border: 2px solid var(--line);
    border-radius: 12px;
    padding: 8px 12px;
    font-weight: 800;
  }
  .judge-badge.a { background: var(--a); }
  .judge-badge.b { background: var(--b); }
  .judge-badge.c { background: var(--c); }
  .result-main {
    font-size: 14px;
    color: var(--muted);
  }
  .result-level {
    margin-top: 8px;
    font-size: 56px;
    font-weight: 900;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 14px 0;
    text-align: center;
  }
  .result-level.a { background: var(--a); }
  .result-level.b { background: var(--b); }
  .result-level.c { background: var(--c); }
  .summary-box {
    margin-top: 12px;
    padding: 12px;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    background: #fafafa;
    font-size: 14px;
    line-height: 1.6;
  }
  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  button {
    color: #000;
    -webkit-text-fill-color: #000;
    -webkit-appearance: none;
    border: 2px solid var(--line);
    border-radius: 12px;
    background: white;
    padding: 10px 14px;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
  }
  .content {
    margin-top: 16px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    padding-bottom: 260px;
  }
  .section-title {
    margin: 0 0 12px;
    font-size: 22px;
    font-weight: 900;
    padding-left: 10px;
    border-left: 8px solid #111827;
  }
  .field {
    border: 1px solid #d1d5db;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .field-head {
    background: #111827;
    color: white;
    padding: 10px 12px;
    font-weight: 800;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    user-select: none;
  }
  .field-meta {
    font-size: 12px;
    opacity: .8;
    font-weight: 500;
  }
  .field-toggle {
    font-size: 16px;
    line-height: 1;
    min-width: 16px;
    text-align: center;
  }
  .field-help {
    font-size: 14px;
    cursor: pointer;
    opacity: 0.85;
    line-height: 1;
  }
  .field-body {
    padding: 12px;
    background: #fff;
  }
  .options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
  }
  .option {
    border: 2px solid #9ca3af;
    border-radius: 14px;
    padding: 10px;
    min-height: 54px;
    cursor: pointer;
    background: white;
    font-weight: 800;
    line-height: 1.4;
    text-align: center;
  }
  .option.zone-white { background: #fff; }
  .option.zone-yellow { background: var(--b); }
  .option.zone-green { background: var(--c); }
  .option.red-flag { box-shadow: inset 0 0 0 3px var(--danger); }
  .option.selected {
    border-color: #111827;
    outline: 4px solid #111827;
    outline-offset: -4px;
  }
  .option small {
    display: block;
    margin-top: 4px;
    font-size: 11px;
    font-weight: 700;
  }
  .help-content {
    margin-top: 10px;
    padding: 10px;
    border-radius: 12px;
    background: #f9fafb;
    border: 1px solid #d1d5db;
    font-size: 12px;
    line-height: 1.5;
  }
  .help-row {
    margin-bottom: 4px;
  }
  .row {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 12px;
    align-items: center;
  }
  .num-grid {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 10px;
    align-items: center;
  }
  input[type="number"],
  input[type="text"],
  textarea,
  select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 12px;
    border: 2px solid #9ca3af;
    font: inherit;
    background: #fff;
  }
  textarea {
    min-height: 88px;
    resize: vertical;
  }
  .hint {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
  }
  .selected-list {
    margin: 12px 0 0;
    padding-left: 18px;
    font-size: 14px;
    line-height: 1.5;
  }
  .selected-list li { margin-bottom: 6px; }
  pre {
    white-space: pre-wrap;
    word-break: break-word;
    margin-top: 12px;
    background: #0f172a;
    color: #d1fae5;
    padding: 12px;
    border-radius: 12px;
    font-size: 12px;
    overflow: auto;
  }

  /* 複数選択用の色帯チェックリスト */
  .check-group {
    border-radius: 14px;
    padding: 10px;
    margin-bottom: 10px;
  }
  .check-group-white {
    background: #ffffff;
    border: 1px solid #d1d5db;
  }
  .check-group-yellow {
    background: #fff36a;
    border: 1px solid #d4b900;
  }
  .check-group-green {
    background: #48ff48;
    border: 1px solid #2da52d;
  }
  .check-group-redgreen {
    background: #48ff48;
    border: 3px solid #d90000;
  }
  .check-group-title {
    font-size: 12px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .check-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 6px;
  }
  .check-row {
    width: 100%;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    text-align: left;
    border: 1px solid rgba(17,24,39,.18);
    border-radius: 10px;
    background: rgba(255,255,255,.45);
    padding: 9px 10px;
    font: inherit;
    cursor: pointer;
  }
  .check-row.selected {
    border-color: #111827;
    outline: 3px solid #111827;
    outline-offset: -3px;
    background: rgba(255,255,255,.85);
  }
  .checkmark {
    flex: 0 0 auto;
    font-size: 18px;
    line-height: 1;
  }
  .check-label {
    flex: 1 1 auto;
    font-weight: 700;
    line-height: 1.4;
  }

  /* 結果パネル：普段は総合判定だけ、最下部で詳細を展開 */
.result-panel {
  transition:
    box-shadow 0.2s ease,
    transform 0.2s ease;
  will-change: transform;
}
#resultCompact {
  margin-bottom: 0;
  transition: margin-bottom 0.22s ease;
}

#resultFull {
  opacity: 0;
  transform: translateY(10px) scale(0.98);
  transform-origin: bottom center;
  pointer-events: none;
  max-height: 0;
  overflow: hidden;
  transition:
    opacity 0.18s ease,
    transform 0.18s ease,
    max-height 0.42s ease;
}

.result-panel.expanded #resultCompact {
  margin-bottom: 10px;
}

.result-panel.expanded #resultFull {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
  max-height: 40vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.result-panel.compact-only #resultCompact {
  margin-bottom: 0 !important;
}

.result-panel.compact-only #resultFull {
  opacity: 0 !important;
  transform: translateY(10px) scale(0.98) !important;
  pointer-events: none !important;

  max-height: 0 !important;
  overflow: hidden !important;
}

  @media (max-width: 920px) {
    .topbar { grid-template-columns: 1fr; }
    .result-panel {
      position: sticky;
      bottom: 12px;
    }
    .row, .num-grid { grid-template-columns: 1fr; }
    .content { padding-bottom: 300px; }
  }

  @media print {
    body * {
      visibility: hidden !important;
    }
    #resultPanel,
    #resultPanel * {
      visibility: visible !important;
    }
    #resultPanel {
      position: absolute !important;
      left: 0;
      top: 0;
      width: 100%;
      max-width: 100%;
      margin: 0;
      box-shadow: none !important;
      background: #fff !important;
      border: 2px solid #111827 !important;
      backdrop-filter: none !important;
    }
    .actions,
    #jsonOut {
      display: none !important;
    }
    body {
      background: #fff !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <section class="panel">
      <h1>外傷観察カード</h1>
      <div class="sub">
        ※１　赤枠の項目が１つでもあれば、重症と判断する。<br />
		※２　緑色の項目は総合的に重症度を判断する
      </div>
      <div class="judge-badges">
        <div class="judge-badge a">A</div>
        <div class="judge-badge b">B</div>
        <div class="judge-badge c">C</div>
      </div>
    </section>
  </div>

  <div class="content">
    <section class="panel">
      <h2 class="section-title">基本設定</h2>
      <div id="basicSettings"></div>
    </section>
    <section class="panel">
      <h2 class="section-title">外見</h2>
      <div id="appearance"></div>
    </section>
    <section class="panel">
      <h2 class="section-title">バイタルサイン</h2>
      <div id="vitals"></div>
    </section>
    <section class="panel">
      <h2 class="section-title">主訴・局所状態</h2>
      <div id="local"></div>
    </section>
	<section class="panel">
      <h2 class="section-title">記事欄</h2>
      <div id="notes"></div>
    </section>
    <section class="panel result-panel" id="resultPanel">
      <div id="resultCompact">
        <div class="result-main">総合判定</div>
        <div id="resultLevel" class="result-level a">A</div>
      </div>
      <div id="resultFull">
        <div class="resultFullInner">
          <div id="resultReason" class="summary-box"></div>
          <ul id="selectedList" class="selected-list"></ul>
          <div class="actions">
            <button id="exportBtn" type="button">JSON出力</button>
            <button id="resetBtn" type="button">リセット</button>
            <button id="pdfBtn" type="button">PDF出力</button>
          </div>
          <pre id="jsonOut" hidden></pre>
        </div>
      </div>
    </section>
  </div>
</div>

const state = {
  // 各入力値を保持する
  values: {},
  // 複数選択項目の折りたたみ状態を保持する
  openGroups: {},
  // 補足（ⓘ）の開閉状態を保持する
  helpOpen: {},
  // 記事欄入力中かどうか
  notesEditing: false
};

/**
 * field.id から schema 上の field 定義を取り出す
 */
function getFieldById(fieldId) {
  for (const section of schema.sections) {
    for (const field of section.fields) {
      if (field.id === fieldId) return field;
    }
  }
  return null;
}

/**
 * UI上に出す項目タイプの表示ラベル
 */
function getKindLabel(kind) {
  if (kind === 'single') return '単一選択';
  if (kind === 'multi') return '複数選択可';
  if (kind === 'number') return '数値入力';
  if (kind === 'number_free') return '数値入力';
  if (kind === 'select') return '選択';
  if (kind === 'text') return '自由入力';
  return '';
}

/**
 * 数値入力の値が、どの閾値ルールに当てはまるかを返す
 */
function matchThreshold(value, rules) {
  if (value === '' || value === null || value === undefined) return null;
  const num = Number(value);
  if (Number.isNaN(num)) return null;

  return (rules || []).find(function(rule) {
    const minOk = rule.min === null || rule.min === undefined ? true : num >= rule.min;
    const maxOk = rule.max === null || rule.max === undefined ? true : num <= rule.max;
    return minOk && maxOk;
  }) || null;
}

/**
 * 1つの field の入力値を、結果表示用の共通オブジェクトへ変換する
 * multi は配列、single/number/text は単体オブジェクトで返す
 */
function getEvaluation(field) {
  const raw = state.values[field.id];

  if (field.kind === 'multi') {
    if (!raw || raw.length === 0) return null;

    return raw.map(function(id) {
      const found = field.options.find(function(opt) {
        return opt.id === id;
      });
      if (!found) return null;

      return {
        fieldId: field.id,
        fieldLabel: field.label,
        inputType: field.kind,
        selectedId: found.id,
        selectedLabel: found.label,
        level: found.level || null,
        redFlag: !!found.redFlag,
        colorZone: found.colorZone || null
      };
    }).filter(Boolean);
  }

  if (field.kind === 'single') {
    if (!raw) return null;
    const found = field.options.find(function(opt) {
      return opt.id === raw;
    });
    if (!found) return null;

    return {
      fieldId: field.id,
      fieldLabel: field.label,
      inputType: field.kind,
      selectedId: found.id,
      selectedLabel: found.label,
      level: found.level || null,
      redFlag: !!found.redFlag,
      colorZone: found.colorZone || null
    };
  }

  if (field.kind === 'number') {
    const modeKey = field.id + '__mode';
    const modeVal = state.values[modeKey];

    if (modeVal && field.extraOptions) {
      const extra = field.extraOptions.find(function(opt) {
        return opt.id === modeVal;
      });
      if (extra) {
        return {
          fieldId: field.id,
          fieldLabel: field.label,
          inputType: field.kind,
          selectedId: extra.id,
          selectedLabel: extra.label,
          numericValue: null,
          unit: field.unit || null,
          level: extra.level || null,
          redFlag: !!extra.redFlag,
          colorZone: extra.colorZone || null
        };
      }
    }

    if (raw === '' || raw === undefined || raw === null) return null;

    const ageBand = state.values.age_band || 'adult';
    const rules = field.thresholdsByAge ? field.thresholdsByAge[ageBand] : field.thresholds;
    const matched = matchThreshold(raw, rules);

    if (!matched) {
      return {
        fieldId: field.id,
        fieldLabel: field.label,
        inputType: field.kind,
        numericValue: Number(raw),
        unit: field.unit || null,
        selectedLabel: '閾値外',
        level: null,
        redFlag: false,
        colorZone: null
      };
    }

    return {
      fieldId: field.id,
      fieldLabel: field.label,
      inputType: field.kind,
      numericValue: Number(raw),
      unit: field.unit || null,
      selectedLabel: matched.label,
      level: matched.level || null,
      redFlag: !!matched.redFlag,
      colorZone: matched.colorZone || null
    };
  }

  if (field.kind === 'select') {
    if (!raw) return null;
    const found = field.options.find(function(opt) {
      return opt.id === raw;
    });
    if (!found) return null;

    return {
      fieldId: field.id,
      fieldLabel: field.label,
      inputType: field.kind,
      selectedId: found.id,
      selectedLabel: found.label,
      level: found.level || null,
      redFlag: !!found.redFlag,
      colorZone: found.colorZone || null
    };
  }

  if (field.kind === 'number_free') {
    if (raw === '' || raw === undefined || raw === null) return null;

    return {
      fieldId: field.id,
      fieldLabel: field.label,
      inputType: field.kind,
      numericValue: Number(raw),
      unit: field.unit || null,
      selectedLabel: String(raw) + (field.unit || ''),
      level: null,
      redFlag: false,
      colorZone: null
    };
  }

  if (field.kind === 'text') {
    if (!raw) return null;

    return {
      fieldId: field.id,
      fieldLabel: field.label,
      inputType: field.kind,
      textValue: raw,
      selectedLabel: raw,
      level: null,
      redFlag: false,
      colorZone: null
    };
  }

  return null;
}

/**
 * 全 field の評価結果を配列にまとめる
 */
function evaluateAll() {
  const evaluations = [];

  for (const section of schema.sections) {
    for (const field of section.fields) {
      const evaluated = getEvaluation(field);
      if (Array.isArray(evaluated)) {
        evaluations.push.apply(evaluations, evaluated);
      } else if (evaluated) {
        evaluations.push(evaluated);
      }
    }
  }

  return evaluations;
}

/**
 * 評価結果から総合判定（A/B/C）を出す
 * 赤枠最優先 → C複数 → B複数 → B単発 の順で判定
 */
function summarizeResult(evaluations) {
  const withLevel = evaluations.filter(function(v) {
    return v.level;
  });
  const redFlags = withLevel.filter(function(v) {
    return v.redFlag;
  });
  const cItems = withLevel.filter(function(v) {
    return v.level === 'C';
  });
  const bItems = withLevel.filter(function(v) {
    return v.level === 'B';
  });

  let level = 'A';
  let reasons = [];

  if (redFlags.length > 0) {
    level = 'C';
    reasons.push('赤枠条件に該当する入力があるためC');
  } else if (cItems.length >= 2) {
    level = 'C';
    reasons.push('C相当の所見が複数あるためC');
  } else if (cItems.length === 1 || bItems.length >= 3) {
    level = 'B';
    reasons.push('異常所見の集積によりB');
  } else if (bItems.length >= 1) {
    level = 'B';
    reasons.push('注意所見があるためB');
  } else {
    level = 'A';
    reasons.push('現時点で重大条件なし');
  }

  return {
    level: level,
    reasons: reasons,
    redFlags: redFlags,
    evaluations: withLevel
  };
}

/**
 * field または option に設定された補足文をまとめて取り出す
 */
function getHelpRows(field) {
  const rows = [];

  if (field.help) {
    rows.push({
      label: field.label,
      text: field.help
    });
  }

  if (field.options && Array.isArray(field.options)) {
    field.options.forEach(function(opt) {
      if (opt.help) {
        rows.push({
          label: opt.label,
          text: opt.help
        });
      }
    });
  }

  return rows;
}

/**
 * 補足（ⓘ）表示用のDOMを作る
 */
function buildHelpContent(field) {
  const list = document.createElement('div');
  list.className = 'help-content';

  const rows = getHelpRows(field);
  rows.forEach(function(item) {
    const row = document.createElement('div');
    row.className = 'help-row';
    row.textContent = item.label + '：' + item.text;
    list.appendChild(row);
  });

  return list;
}

/**
 * 単一選択ボタンの見た目クラスを返す
 */
function createOptionButtonClass(option) {
  return 'option zone-' + (option.colorZone || 'white') + (option.redFlag ? ' red-flag' : '');
}

/**
 * single 用の選択ボタンを作る
 * 同じボタンを再度押したら解除できる
 */
function makeOptionButton(field, option) {
  const button = document.createElement('button');
  button.type = 'button';
  button.className = createOptionButtonClass(option);
  button.dataset.fieldId = field.id;
  button.dataset.optionId = option.id;
  button.innerHTML = option.label + (option.level ? '<small>' + option.level + '</small>' : '');

  button.addEventListener('click', function() {
    const current = state.values[field.id];
    if (current === option.id) {
      delete state.values[field.id];
    } else {
      state.values[field.id] = option.id;
    }
    updateUI();
  });

  return button;
}

/**
 * multi 用のチェックリストを色帯ごとに描画する
 */
function renderMultiChecklist(container, field) {
  const groups = {
    white: [],
    yellow: [],
    green: [],
    redgreen: []
  };

  field.options.forEach(function(opt) {
    if (opt.colorZone === 'white') {
      groups.white.push(opt);
    } else if (opt.colorZone === 'yellow') {
      groups.yellow.push(opt);
    } else if (opt.colorZone === 'green' && opt.redFlag) {
      groups.redgreen.push(opt);
    } else if (opt.colorZone === 'green') {
      groups.green.push(opt);
    } else {
      groups.white.push(opt);
    }
  });

  const defs = [
    { key: 'white', label: '白', className: 'check-group-white' },
    { key: 'yellow', label: '黄', className: 'check-group-yellow' },
    { key: 'green', label: '緑', className: 'check-group-green' },
    { key: 'redgreen', label: '赤枠緑', className: 'check-group-redgreen' }
  ];

  defs.forEach(function(def) {
    const items = groups[def.key];
    if (!items || items.length === 0) return;

    const block = document.createElement('div');
    block.className = 'check-group ' + def.className;

    const title = document.createElement('div');
    title.className = 'check-group-title';
    title.textContent = def.label;
    block.appendChild(title);

    const list = document.createElement('div');
    list.className = 'check-list';

    items.forEach(function(opt) {
      const row = document.createElement('button');
      row.type = 'button';
      row.className = 'check-row';
      row.dataset.fieldId = field.id;
      row.dataset.optionId = opt.id;

      const mark = document.createElement('span');
      mark.className = 'checkmark';
      mark.textContent = '□';

      const text = document.createElement('span');
      text.className = 'check-label';
      text.textContent = opt.label;

      row.appendChild(mark);
      row.appendChild(text);

      row.addEventListener('click', function() {
        const fid = field.id;
        const oid = opt.id;

        if (!state.values[fid]) state.values[fid] = [];

        const index = state.values[fid].indexOf(oid);
        if (index >= 0) {
          state.values[fid].splice(index, 1);
          if (state.values[fid].length === 0) {
            delete state.values[fid];
          }
        } else {
          state.values[fid].push(oid);
        }

        updateUI();
      });

      list.appendChild(row);
    });

    block.appendChild(list);
    container.appendChild(block);
  });
}

/**
 * 1つの field を描画する
 * kind ごとに UI を出し分ける
 */
function renderField(container, field) {
  const fieldEl = document.createElement('div');
  fieldEl.className = 'field';

  const head = document.createElement('div');
  head.className = 'field-head';

  const left = document.createElement('span');
  left.textContent = field.label;

  const rightWrap = document.createElement('span');
  rightWrap.style.display = 'flex';
  rightWrap.style.alignItems = 'center';
  rightWrap.style.gap = '8px';

  const meta = document.createElement('span');
  meta.className = 'field-meta';
  meta.textContent = getKindLabel(field.kind);
  rightWrap.appendChild(meta);

  const helpRows = getHelpRows(field);
  if (helpRows.length > 0) {
    const helpBtn = document.createElement('span');
    helpBtn.className = 'field-help';
    helpBtn.textContent = 'ⓘ';
    helpBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      state.helpOpen[field.id] = !state.helpOpen[field.id];
      renderAll();
      updateUI();
    });
    rightWrap.appendChild(helpBtn);
  }

  if (field.kind === 'multi') {
    if (typeof state.openGroups[field.id] === 'undefined') {
      state.openGroups[field.id] = false;
    }

    const toggle = document.createElement('span');
    toggle.className = 'field-toggle';
    toggle.textContent = state.openGroups[field.id] ? '▾' : '▸';
    rightWrap.appendChild(toggle);

    head.style.cursor = 'pointer';
    head.addEventListener('click', function() {
      state.openGroups[field.id] = !state.openGroups[field.id];
      renderAll();
      updateUI();
    });
  }

  head.appendChild(left);
  head.appendChild(rightWrap);
  fieldEl.appendChild(head);

  const body = document.createElement('div');
  body.className = 'field-body';

  if (field.kind === 'multi') {
    body.style.display = state.openGroups[field.id] ? '' : 'none';
    renderMultiChecklist(body, field);
  }

  if (field.kind === 'single') {
    const options = document.createElement('div');
    options.className = 'options';
    field.options.forEach(function(option) {
      options.appendChild(makeOptionButton(field, option));
    });
    body.appendChild(options);
  }

  if (field.kind === 'select') {
    const wrap = document.createElement('div');
    wrap.className = 'row';

    const label = document.createElement('div');
    label.textContent = '選択';

    const select = document.createElement('select');
    const empty = document.createElement('option');
    empty.value = '';
    empty.textContent = '選んでください';
    select.appendChild(empty);

    field.options.forEach(function(opt) {
      const option = document.createElement('option');
      option.value = opt.id;
      option.textContent = opt.label;
      select.appendChild(option);
    });

    if (state.values[field.id]) {
      select.value = state.values[field.id];
    }

    select.addEventListener('change', function() {
      if (select.value) {
        state.values[field.id] = select.value;
      } else {
        delete state.values[field.id];
      }
      updateUI();
    });

    wrap.appendChild(label);
    wrap.appendChild(select);
    body.appendChild(wrap);
  }

  if (field.kind === 'number') {
    const grid = document.createElement('div');
    grid.className = 'num-grid';

    const leftNum = document.createElement('div');
    leftNum.textContent = field.unit ? '数値（' + field.unit + '）' : '数値';

    const input = document.createElement('input');
    input.type = 'number';
    input.placeholder = field.placeholder || '数値入力';
    input.step = 'any';
    if (state.values[field.id] !== undefined) {
      input.value = state.values[field.id];
    }

    input.addEventListener('input', function() {
      if (input.value === '') {
        delete state.values[field.id];
      } else {
        state.values[field.id] = input.value;
      }
      const modeKey = field.id + '__mode';
      delete state.values[modeKey];
      updateUI();
    });

    grid.appendChild(leftNum);
    grid.appendChild(input);
    body.appendChild(grid);

    if (field.extraOptions && field.extraOptions.length) {
      const optWrap = document.createElement('div');
      optWrap.className = 'options';
      optWrap.style.marginTop = '10px';

      field.extraOptions.forEach(function(opt) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = createOptionButtonClass(opt);
        btn.dataset.fieldId = field.id;
        btn.dataset.optionId = opt.id;
        btn.textContent = opt.label;

        btn.addEventListener('click', function() {
          const key = field.id + '__mode';
          const current = state.values[key];

          if (current === opt.id) {
            delete state.values[key];
          } else {
            state.values[key] = opt.id;
            state.values[field.id] = '';
          }

          updateUI();
        });

        optWrap.appendChild(btn);
      });

      body.appendChild(optWrap);
    }

    const hint = document.createElement('div');
    hint.className = 'hint';
    hint.id = field.id + '__hint';
    body.appendChild(hint);
  }

  if (field.kind === 'number_free') {
    const grid = document.createElement('div');
    grid.className = 'num-grid';

    const leftFree = document.createElement('div');
    leftFree.textContent = field.unit ? '数値（' + field.unit + '）' : '数値';

    const input = document.createElement('input');
    input.type = 'number';
    input.placeholder = field.placeholder || '';
    input.step = 'any';
    if (state.values[field.id] !== undefined) {
      input.value = state.values[field.id];
    }

    input.addEventListener('input', function() {
      if (input.value === '') {
        delete state.values[field.id];
      } else {
        state.values[field.id] = input.value;
      }
      updateUI();
    });

    grid.appendChild(leftFree);
    grid.appendChild(input);
    body.appendChild(grid);
  }

  if (field.kind === 'text') {
    const area = document.createElement('textarea');
    area.placeholder = field.label;
    if (state.values[field.id]) {
      area.value = state.values[field.id];
    }

    area.addEventListener('input', function() {
      if (area.value) {
        state.values[field.id] = area.value;
      } else {
        delete state.values[field.id];
      }
      updateUI();
    });

    body.appendChild(area);
  }

  if (state.helpOpen[field.id]) {
    body.appendChild(buildHelpContent(field));
  }

  fieldEl.appendChild(body);
  container.appendChild(fieldEl);
}

/**
 * schema 全体から UI を描き直す
 * 折りたたみや補足開閉を変えたときに使う
 */
function renderAll() {
  schema.sections.forEach(function(section) {
    const mount = document.getElementById(section.mountId);
    if (!mount) return;
    mount.innerHTML = '';
    section.fields.forEach(function(field) {
      renderField(mount, field);
    });
  });
}

/**
 * 既存DOMへ「選択済み」の見た目だけ反映する
 * 値入力そのものは renderField 時にセット済み
 */
function syncVisualState() {
  schema.sections.forEach(function(section) {
    section.fields.forEach(function(field) {
      if (field.kind === 'single') {
        document.querySelectorAll('.option[data-field-id="' + field.id + '"]').forEach(function(el) {
          el.classList.toggle('selected', state.values[field.id] === el.dataset.optionId);
        });
      }

      if (field.kind === 'multi') {
        const selected = state.values[field.id] || [];
        document.querySelectorAll('.check-row[data-field-id="' + field.id + '"]').forEach(function(el) {
          const isSelected = selected.indexOf(el.dataset.optionId) >= 0;
          el.classList.toggle('selected', isSelected);
          const mark = el.querySelector('.checkmark');
          if (mark) {
            mark.textContent = isSelected ? '☑' : '□';
          }
        });
      }

      if (field.kind === 'number' && field.extraOptions) {
        document.querySelectorAll('.option[data-field-id="' + field.id + '"]').forEach(function(el) {
          const modeKey = field.id + '__mode';
          el.classList.toggle('selected', state.values[modeKey] === el.dataset.optionId);
        });
      }
    });
  });
}

/**
 * number 系 field の補助テキストを更新する
 */
function updateNumberHints() {
  schema.sections.forEach(function(section) {
    section.fields.forEach(function(field) {
      if (field.kind !== 'number') return;

      const hint = document.getElementById(field.id + '__hint');
      if (!hint) return;

      const evaluated = getEvaluation(field);

      if (!evaluated) {
        if (field.thresholdsByAge) {
          const ageBand = state.values.age_band || 'adult';
          const ageBandItem = schema.ageBands.find(function(x) {
            return x.id === ageBand;
          });
          const ageLabel = ageBandItem ? ageBandItem.label : '成人';
          hint.textContent = ageLabel + 'の基準で判定';
        } else {
          hint.textContent = '入力すると自動判定';
        }
        return;
      }

      if (evaluated.numericValue !== undefined && evaluated.numericValue !== null) {
        hint.textContent = '判定帯: ' + evaluated.selectedLabel + (evaluated.level ? ' / ' + evaluated.level : '');
      } else {
        hint.textContent = '判定: ' + evaluated.selectedLabel + (evaluated.level ? ' / ' + evaluated.level : '');
      }
    });
  });
}

/**
 * 総合判定パネルの中身を更新する
 */
function updateResultPanel(summary) {
  const resultLevel = document.getElementById('resultLevel');
  resultLevel.textContent = summary.level;
  resultLevel.className = 'result-level ' + String(summary.level).toLowerCase();

  const reason = document.getElementById('resultReason');
  const redText = summary.redFlags.length > 0
    ? '赤枠: ' + summary.redFlags.map(function(x) {
        return x.fieldLabel + '=' + x.selectedLabel;
      }).join(' / ')
    : '赤枠該当なし';

  reason.innerHTML =
    '<div>' + summary.reasons.join('・') + '</div>' +
    '<div style="margin-top:8px;">' + redText + '</div>' +
    '<div style="margin-top:8px;font-size:12px;color:#6b7280;">緑項目の総合判断ロジックは暫定。運用に合わせて要調整。</div>';

  const selectedList = document.getElementById('selectedList');
  selectedList.innerHTML = '';

  summary.evaluations.forEach(function(item) {
    const li = document.createElement('li');

    let valueText = item.selectedLabel;
    if (item.numericValue !== undefined && item.numericValue !== null) {
      valueText = String(item.numericValue) + (item.unit || '') + ' → ' + item.selectedLabel;
    }

    li.textContent =
      item.fieldLabel +
      ': ' +
      valueText +
      (item.level ? ' [' + item.level + ']' : '') +
      (item.redFlag ? ' ※赤枠' : '');

    selectedList.appendChild(li);
  });
}

/**
 * 現在状態を JSON 出力用のオブジェクトへ変換する
 */
function buildExportObject(summary) {
  const fields = {};
  schema.sections.forEach(function(section) {
    section.fields.forEach(function(field) {
      const evaluated = getEvaluation(field);
      if (!evaluated) return;
      fields[field.id] = evaluated;
    });
  });

  return {
    meta: schema.meta,
    exportedAt: new Date().toISOString(),
    overallResult: {
      level: summary.level,
      reasons: summary.reasons,
      redFlags: summary.redFlags.map(function(x) {
        return {
          fieldId: x.fieldId,
          fieldLabel: x.fieldLabel,
          selectedLabel: x.selectedLabel
        };
      })
    },
    values: JSON.parse(JSON.stringify(state.values)),
    evaluatedFields: fields
  };
}

/**
 * JSON のプレビュー表示を更新する
 */
function updateExportPreview(summary) {
  const out = document.getElementById('jsonOut');
  if (!out || out.hidden) return;
  out.textContent = JSON.stringify(buildExportObject(summary), null, 2);
}

/**
 * 画面上の状態をまとめて再計算・再表示する
 */
function updateUI() {
  syncVisualState();
  updateNumberHints();

  const evaluations = evaluateAll();
  const summary = summarizeResult(evaluations);

  updateResultPanel(summary);
  updateExportPreview(summary);
  updateResultPanelState();
}

/**
 * JSONプレビューを開く
 */
function exportJSON() {
  const summary = summarizeResult(evaluateAll());
  const out = document.getElementById('jsonOut');
  if (!out) return;
  out.hidden = false;
  out.textContent = JSON.stringify(buildExportObject(summary), null, 2);
}

/**
 * 結果パネルだけ別ウィンドウへ書き出して印刷する
 */
function exportResultPDF() {
  var resultPanel = document.getElementById('resultPanel');
  if (!resultPanel) return;

  var printWindow = window.open('', '_blank');
  if (!printWindow) {
    alert('ポップアップがブロックされています');
    return;
  }

  var html =
    '<!DOCTYPE html>' +
    '<html lang="ja">' +
    '<head>' +
    '<meta charset="UTF-8">' +
    '<meta name="viewport" content="width=device-width, initial-scale=1.0">' +
    '<title>外傷観察カード 結果</title>' +
    '<style>' +
    '@page { size: A4; margin: 12mm; }' +
    'body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; color: #111827; margin: 0; padding: 0; background: #fff; }' +
    '.print-wrap { width: 100%; }' +
    '.panel { border: 2px solid #111827; border-radius: 16px; padding: 16px; box-shadow: none; background: #fff; }' +
    '.result-main { font-size: 14px; color: #6b7280; }' +
    '.result-level { margin-top: 8px; font-size: 48px; font-weight: 900; border: 2px solid #111827; border-radius: 16px; padding: 12px 0; text-align: center; }' +
    '.result-level.a { background: #f3f4f6; }' +
    '.result-level.b { background: #fff36a; }' +
    '.result-level.c { background: #48ff48; }' +
    '.summary-box { margin-top: 12px; padding: 12px; border: 1px solid #d1d5db; border-radius: 12px; background: #fafafa; font-size: 14px; line-height: 1.6; }' +
    '.selected-list { margin: 12px 0 0; padding-left: 18px; font-size: 14px; line-height: 1.5; }' +
    '.selected-list li { margin-bottom: 6px; }' +
    '.actions, #jsonOut, button { display: none !important; }' +
    '</style>' +
    '</head>' +
    '<body>' +
    '<div class="print-wrap">' +
    resultPanel.outerHTML +
    '</div>' +
    '</body>' +
    '</html>';

  printWindow.document.open();
  printWindow.document.write(html);
  printWindow.document.close();

  setTimeout(function() {
    printWindow.focus();
    printWindow.print();
  }, 500);
}

/**
 * 全入力を初期化する
 */
function resetAll() {
  state.values = {};
  state.helpOpen = {};

  const out = document.getElementById('jsonOut');
  if (out) {
    out.hidden = true;
    out.textContent = '';
  }

  renderAll();
  updateUI();
}

/**
 * 結果パネルの表示状態を制御する
 * - 画面最下部では expanded
 * - 記事欄入力中は compact-only
 */
function updateResultPanelState() {
  var panel = document.getElementById('resultPanel');
  if (!panel) return;

  // 記事欄入力中なら必ず閉じる
  if (state.notesEditing) {
    panel.classList.remove('expanded');
    panel.classList.add('compact-only');
    return;
  }

  var scrollTop = window.pageYOffset || document.documentElement.scrollTop || 0;
  var viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
  var docHeight = Math.max(
    document.body.scrollHeight,
    document.documentElement.scrollHeight,
    document.body.offsetHeight,
    document.documentElement.offsetHeight
  );

  var currentBottom = scrollTop + viewportHeight;

  // 開く位置と閉じる位置を分けてチラつきを防ぐ
  var openThreshold = docHeight - 40;
  var closeThreshold = docHeight - 180;

  var isExpanded = panel.classList.contains('expanded');

  panel.classList.remove('compact-only');

  if (!isExpanded && currentBottom >= openThreshold) {
    panel.classList.add('expanded');
  } else if (isExpanded && currentBottom < closeThreshold) {
    panel.classList.remove('expanded');
  }
}
	
/**
 * 記事欄 focus とスクロールイベントを監視して
 * 結果パネルの状態を更新する
 */
function setupResultPanelState() {
  var notes = document.getElementById('notes');

  if (notes) {
    notes.addEventListener('focusin', function() {
      state.notesEditing = true;
      updateResultPanelState();
    });

    notes.addEventListener('focusout', function() {
      setTimeout(function() {
        var active = document.activeElement;
        state.notesEditing = !!(notes && active && notes.contains(active));
        updateResultPanelState();
      }, 0);
    });
  }

  window.addEventListener('scroll', updateResultPanelState);
  window.addEventListener('resize', updateResultPanelState);
  window.addEventListener('load', updateResultPanelState);
}

/**
 * ボタン類のイベントを初期化する
 */
function bindGlobalEvents() {
  var exportBtn = document.getElementById('exportBtn');
  if (exportBtn) {
    exportBtn.addEventListener('click', exportJSON);
  }

  var resetBtn = document.getElementById('resetBtn');
  if (resetBtn) {
    resetBtn.addEventListener('click', resetAll);
  }

  var pdfBtn = document.getElementById('pdfBtn');
  if (pdfBtn) {
    pdfBtn.addEventListener('click', exportResultPDF);
  }
}

/**
 * 初期化処理
 * UI描画 → イベント登録 → 初回表示更新
 */
function initApp() {
  renderAll();
  bindGlobalEvents();
  setupResultPanelState();
  updateUI();
}

initApp();
</script>
